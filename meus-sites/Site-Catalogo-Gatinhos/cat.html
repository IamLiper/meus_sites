<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Detalhes do Gatinho</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #fff0f6, #f3e8ff);
      animation: fadeIn 0.6s ease;
    }

    header {
      text-align: center;
      padding: 20px;
      background-color: #f3e8ff;
      color: #5b3c88;
    }

    .cat-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 20px;
      padding: 20px;
    }

    .cat-container img {
      width: 100%;
      max-width: 300px;
      border-radius: 20px;
      animation: fadeIn 0.6s ease;
    }

    .info {
      background: white;
      padding: 20px;
      border-radius: 20px;
      max-width: 350px;
      width: 100%;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      animation: slideUp 0.5s ease;
    }

    .info p {
      margin: 8px 0;
      color: #555;
    }

    .info strong {
      color: #7e57c2;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background-color: #e1bee7;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      transition: 0.3s;
    }

    button:hover {
      background-color: #f8bbd0;
      transform: scale(1.03);
    }

    /* animações */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* mobile */
    @media (max-width: 600px) {
      header {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1 id="nome">Carregando...</h1>
  </header>

  <main class="cat-container">
    <img id="imagem" src="">

    <div class="info">
      <p><strong>Raça:</strong> <span id="raca"></span></p>
      <p><strong>Cor:</strong> <span id="cor"></span></p>
      <p><strong>Idade:</strong> <span id="idade"></span></p>
      <p><strong>Peso:</strong> <span id="peso"></span></p>
      <p><strong>Tamanho:</strong> <span id="tamanho"></span></p>
      <p><strong>Descrição:</strong> <span id="descricao"></span></p>

      <button onclick="voltar()">⬅ Voltar</button>
    </div>
  </main>

  <!-- dados -->
  <script src="js/data.js"></script>

  <!-- lógica -->
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const cat = cats.find(c => c.id == id);

    if (!cat) {
      document.body.innerHTML = "<h2 style='text-align:center;'>Gatinho não encontrado 😢</h2>";
    } else {
      document.getElementById("nome").textContent = cat.nome;
      document.getElementById("raca").textContent = cat.raca;
      document.getElementById("cor").textContent = cat.cor;
      document.getElementById("idade").textContent = cat.idade;
      document.getElementById("peso").textContent = cat.peso;
      document.getElementById("tamanho").textContent = cat.tamanho;
      document.getElementById("descricao").textContent = cat.descricao;
      document.getElementById("imagem").src = cat.imagem;
    }

    function voltar() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
